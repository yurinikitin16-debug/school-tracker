<section class="teachers-page">
  <ui-page-header eyebrow="Довідники" title="Вчителі" />

  <ui-toolbar>
    <ui-input
      class="teachers-search"
      icon="search"
      placeholder="Пошук за ім'ям або предметом..."
      [value]="searchTerm()"
      (valueChange)="searchTerm.set($event)"
    />
    <button class="primary-button teachers-add" type="button" (click)="openCreate()">Додати вчителя</button>
  </ui-toolbar>

  <article class="teachers-card">
    @if (rows().length) {
      <div class="teachers-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Вчитель</th>
              <th>Предмет</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            @for (teacher of rows(); track teacher.id) {
              <tr>
                <td><strong>{{ teacher.fullName }}</strong></td>
                <td>{{ teacher.subject }}</td>
                <td>
                  <button class="teacher-edit" type="button" title="Редагувати вчителя" aria-label="Редагувати вчителя" (click)="openEdit(teacher)">
                    <ui-icon name="pencil" />
                  </button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    } @else {
      <ui-empty-state title="Вчителів не знайдено" description="Спробуйте змінити пошуковий запит або додайте нового вчителя." icon="users" />
    }
  </article>

  <ui-side-panel [open]="isPanelOpen()" [title]="panelTitle()" (closed)="closePanel()">
    <div class="teacher-editor">
      <ui-input label="ПІБ" [value]="draftFullName()" (valueChange)="draftFullName.set($event)" />
      <ui-input label="Предмет" [value]="draftSubject()" (valueChange)="draftSubject.set($event)" />
      <div class="teacher-editor__actions">
        <button class="secondary-button" type="button" (click)="closePanel()">Скасувати</button>
        <button class="primary-button" type="button" [disabled]="!draftFullName().trim() || !draftSubject().trim()" (click)="saveTeacher()">
          Зберегти
        </button>
      </div>
    </div>
  </ui-side-panel>
</section>
