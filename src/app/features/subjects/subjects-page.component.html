<section class="subjects-page">
  <ui-page-header eyebrow="Довідники" title="Предмети" />

  <ui-toolbar>
    <ui-input
      class="subjects-search"
      icon="search"
      placeholder="Пошук за назвою предмета..."
      [value]="searchTerm()"
      (valueChange)="searchTerm.set($event)"
    />
    <button class="primary-button subjects-add" type="button" (click)="openCreate()">Додати предмет</button>
  </ui-toolbar>

  <article class="subjects-card">
    @if (rows().length) {
      <div class="subjects-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Предмет</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            @for (subject of rows(); track subject.id) {
              <tr>
                <td><strong>{{ subject.name }}</strong></td>
                <td>
                  <button class="subject-edit" type="button" title="Редагувати предмет" aria-label="Редагувати предмет" (click)="openEdit(subject)">
                    <ui-icon name="pencil" />
                  </button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    } @else {
      <ui-empty-state title="Предметів не знайдено" description="Спробуйте змінити пошуковий запит або додайте предмет." icon="book-open" />
    }
  </article>

  <ui-side-panel [open]="isPanelOpen()" [title]="panelTitle()" (closed)="closePanel()">
    <div class="subject-editor">
      <ui-input label="Назва предмета" [value]="draftName()" (valueChange)="draftName.set($event)" />
      <div class="subject-editor__actions">
        <button class="secondary-button" type="button" (click)="closePanel()">Скасувати</button>
        <button class="primary-button" type="button" [disabled]="!draftName().trim()" (click)="saveSubject()">Зберегти</button>
      </div>
    </div>
  </ui-side-panel>
</section>
